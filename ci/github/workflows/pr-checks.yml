name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Unit Tests
        run: npm test --if-present
      - name: Security Scan (placeholder)
        run: echo "Run SAST/secret scan here"
