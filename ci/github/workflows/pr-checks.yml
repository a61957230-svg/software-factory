name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install (if Node project)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json; skipping npm ci"
          fi

      - name: Lint (if Node project)
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
          else
            echo "No package.json; skipping lint"
          fi

      - name: Unit Tests (if Node project)
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          else
            echo "No package.json; skipping tests"
          fi

      - name: Validate sample task packet
        run: python3 scripts/validate_task_packet.py examples/task-packet.alpha.json

      - name: Enforce assignment hard-gate (valid packet)
        run: |
          python3 scripts/assign_task.py examples/task-packet.alpha.json

      - name: Security Scan (placeholder)
        run: echo "Run SAST/secret scan here"
